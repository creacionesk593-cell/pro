<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tablero en Vivo - TuBingo Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
    #contenedorPrincipal { display: flex; min-height: 100vh; max-width: 1300px; margin: 0 auto; padding: 15px; gap: 15px; overflow-x: hidden; }
    #contenedorPrincipal.horizontal { flex-direction: column; align-items: center; justify-content: flex-start; }
    #contenedorPrincipal.vertical-derecha { flex-direction: row; align-items: flex-start; justify-content: center; flex-wrap: nowrap; }
    #contenedorPrincipal.vertical-izquierda { flex-direction: row-reverse; align-items: flex-start; justify-content: center; flex-wrap: nowrap; }

    #zonaTablero { flex: 1 1 auto; padding: 6px; display: flex; flex-direction: column; align-items: center; max-width: 100%; min-width: 0; }
    #zonaCamaras { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 100%; }
    .horizontal #zonaCamaras { flex-direction: row; margin-top: 10px; }
    .vertical-derecha #zonaCamaras, .vertical-izquierda #zonaCamaras { flex-direction: column; flex: 0 1 220px; min-width: 90px; max-width: 260px; flex-shrink: 1; }

    @media (max-width: 480px) {
      #contenedorPrincipal { padding: 6px; gap: 8px; }
      #zonaTablero { padding: 2px; }
      .vertical-derecha #zonaCamaras, .vertical-izquierda #zonaCamaras { flex: 0 1 110px; min-width: 70px; }
      .vertical-derecha .num-celda, .vertical-izquierda .num-celda { width: clamp(16px, 5.5vw, 32px) !important; height: clamp(16px, 5.5vw, 32px) !important; font-size: clamp(0.45rem, 2.2vw, 0.7rem) !important; }
      .vertical-derecha .cabecera-letra, .vertical-izquierda .cabecera-letra { font-size: clamp(0.7rem, 3vw, 1rem) !important; }
    }

    .cam-box { background: black; border-radius: 8px; overflow: hidden; width: 100%; max-width: 300px; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; }
    .cam-box video, .cam-box iframe { width: 100%; height: 100%; border: none; object-fit: cover; }
    .cam-box span { font-size: 0.75rem; color: #999; padding: 10px; text-align: center; }

    #numeroActual { font-size: clamp(2.2rem, 10vw, 5rem); font-weight: bold; text-align: center; margin: 10px 0; padding: clamp(6px,2vw,10px) clamp(14px,5vw,30px); border-radius: 12px; background: #e67e22; animation: parpadeo 1s infinite; max-width: 90vw; }
    @keyframes parpadeo { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    #ultimos5 { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .chip-ultimo { background: #34495e; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: clamp(0.75rem, 3vw, 1rem); }

    .columna-letra { display: flex; flex-direction: column; align-items: center; gap: clamp(3px, 1vw, 6px); }
    .cabecera-letra { font-size: clamp(1rem, 4.5vw, 1.6rem); font-weight: bold; background: #1e293b; width: 100%; text-align: center; padding: clamp(3px,1vw,6px); border-radius: 6px; }
    #grillaBingo { display: flex; gap: clamp(3px, 1.2vw, 8px); margin-top: 10px; max-width: 100%; }
    .num-celda { width: clamp(24px, 7.5vw, 45px); height: clamp(24px, 7.5vw, 45px); display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #1e293b; font-weight: bold; font-size: clamp(0.6rem, 3vw, 0.95rem); }
    .num-celda.marcado { background: #2ecc71; color: #0f172a; }
    .num-celda.ultimo { animation: parpadeo 1s infinite; background: #e67e22; color: white; }

    /* Cuadrícula simple: 15 columnas x 5 filas, números en orden, como cartilla clásica */
    #grillaBingo.simple { display: grid; grid-template-columns: repeat(15, 1fr); gap: clamp(2px, 0.6vw, 5px); width: 100%; max-width: 900px; }
    #grillaBingo.simple .num-celda { width: 100%; aspect-ratio: 1/1; height: auto; font-size: clamp(0.55rem, 2.2vw, 0.85rem); }

    /* Plantilla "Show": cámara 1 grande + resto pequeñas, arriba del todo (modo horizontal) */
    .plantilla-show.horizontal #zonaCamaras { order: -1; flex-direction: row; align-items: flex-start; margin-bottom: 15px; }
    .plantilla-show #zonaCamaras .cam-box:first-child { width: min(60vw, 420px); aspect-ratio: 16/9; }
    .plantilla-show #zonaCamaras .cam-box:not(:first-child) { width: min(35vw, 160px); }

    #panelJuegos { margin-top: 20px; width: 100%; max-width: 500px; }
    #panelJuegos h4 { text-align:center; margin-bottom:10px; }
    .juego-chip { display:inline-block; padding:6px 12px; margin:4px; border-radius:20px; font-size:inherit; background:#1e293b; }
    .juego-chip.no-disponible { background:#e74c3c; text-decoration:line-through; opacity:0.7; }

    #mensajeEspera { font-size: 1.8rem; text-align: center; margin-top: 15%; opacity: 0.8; }
  </style>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="conexion.js"></script>
</head>
<body>
  <div id="contenedorPrincipal" class="horizontal">
    <div id="zonaTablero">
      <div id="mensajeEspera" style="display:none;">⏳ Esperando inicio del juego...</div>
      <div id="contenidoTablero" style="display:none; width:100%;">
        <div id="numeroActual">--</div>
        <div id="ultimos5"></div>
        <div id="grillaBingo"></div>
        <div id="panelJuegos"><h4>🏆 Juegos de esta partida</h4><div id="listaJuegosPublico"></div></div>
      </div>
    </div>
    <div id="zonaCamaras"></div>
  </div>

  <button id="btnAjustesVista" onclick="toggleAjustesVista()" title="Ajustar cómo se ve en tu pantalla" style="position:fixed; bottom:14px; right:14px; width:46px; height:46px; border-radius:50%; background:#2c3e50; color:white; border:none; font-size:1.3rem; cursor:pointer; z-index:9998; box-shadow:0 2px 8px rgba(0,0,0,0.4);">⚙️</button>

  <div id="panelAjustesVista" style="display:none; position:fixed; bottom:70px; right:14px; background:#1e293b; padding:16px; border-radius:10px; width:250px; z-index:9998; box-shadow:0 4px 15px rgba(0,0,0,0.5); font-size:0.85rem;">
    <strong>Ajustar vista (solo en tu pantalla)</strong>
    <p style="font-size:0.75rem; color:#94a3b8; margin:6px 0 12px;">Esto no afecta a nadie más, solo cambia cómo lo ves tú en este dispositivo.</p>

    <label style="display:block; margin-bottom:4px;">Orientación:</label>
    <select id="selVistaLayout" style="width:100%; padding:6px; margin-bottom:10px; border-radius:6px;">
      <option value="admin">Usar la del organizador</option>
      <option value="horizontal">Horizontal (cámaras abajo)</option>
      <option value="vertical-derecha">Vertical (cámaras a la derecha)</option>
      <option value="vertical-izquierda">Vertical (cámaras a la izquierda)</option>
    </select>

    <label style="display:block; margin-bottom:4px;">Cuadrícula:</label>
    <select id="selVistaGrid" style="width:100%; padding:6px; margin-bottom:10px; border-radius:6px;">
      <option value="admin">Usar la del organizador</option>
      <option value="bingo">Columnas B-I-N-G-O</option>
      <option value="simple">Cuadrícula simple 1-75</option>
    </select>

    <button onclick="guardarAjustesVistaLocal()" style="width:100%; padding:8px; background:#2ecc71; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Aplicar</button>
    <button onclick="restablecerAjustesVistaLocal()" style="width:100%; padding:8px; background:transparent; color:#94a3b8; border:1px solid #475569; border-radius:6px; cursor:pointer; margin-top:6px;">Restablecer</button>
  </div>

  <script>
    const LETRAS = [
      { letra: "B", desde: 1, hasta: 15 },
      { letra: "I", desde: 16, hasta: 30 },
      { letra: "N", desde: 31, hasta: 45 },
      { letra: "G", desde: 46, hasta: 60 },
      { letra: "O", desde: 61, hasta: 75 }
    ];

    let MI_TENANT_ID = null;

    window.addEventListener('load', async () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("tenant");
      if (!slug) { document.getElementById("mensajeEspera").style.display = "block"; document.getElementById("mensajeEspera").innerText = "Falta indicar el cliente (tenant) en el enlace."; return; }

      const { data: tenant } = await _supabase.from('tenants').select('id').eq('slug', slug).maybeSingle();
      if (!tenant) { document.getElementById("mensajeEspera").style.display = "block"; document.getElementById("mensajeEspera").innerText = "Cliente no encontrado."; return; }

      MI_TENANT_ID = tenant.id;

      const { data: tablero } = await _supabase.from('tablero_bingo').select('*').eq('tenant_id', MI_TENANT_ID).maybeSingle();
      pintarTablero(tablero || {});

      await cargarJuegosPublico();

      _supabase.channel('tablero_publico_' + MI_TENANT_ID)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'tablero_bingo', filter: `tenant_id=eq.${MI_TENANT_ID}` }, (payload) => {
          if (payload.new) pintarTablero(payload.new);
        })
        .subscribe();

      _supabase.channel('juegos_publico_' + MI_TENANT_ID)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'tablero_juegos', filter: `tenant_id=eq.${MI_TENANT_ID}` }, () => {
          cargarJuegosPublico();
        })
        .subscribe();
    });

    let TAMANO_FUENTE_JUEGOS = 16;

    async function cargarJuegosPublico() {
      const { data } = await _supabase.from('tablero_juegos').select('*').eq('tenant_id', MI_TENANT_ID).order('orden', { ascending: true });
      const cont = document.getElementById("listaJuegosPublico");
      cont.style.fontSize = TAMANO_FUENTE_JUEGOS + "px";
      if (!data || data.length === 0) { cont.innerHTML = ""; return; }
      cont.innerHTML = data.map(j => `<span class="juego-chip ${j.disponible ? '' : 'no-disponible'}">${j.nombre}</span>`).join("");
    }

    function construirGrilla() {
      const cont = document.getElementById("grillaBingo");
      cont.classList.remove("simple");
      cont.innerHTML = LETRAS.map(col => {
        let celdas = "";
        for (let n = col.desde; n <= col.hasta; n++) celdas += `<div class="num-celda" id="pub-num-${n}">${n}</div>`;
        return `<div class="columna-letra"><div class="cabecera-letra">${col.letra}</div>${celdas}</div>`;
      }).join("");
    }

    function construirGrillaSimple() {
      const cont = document.getElementById("grillaBingo");
      cont.classList.add("simple");
      let celdas = "";
      for (let n = 1; n <= 75; n++) celdas += `<div class="num-celda" id="pub-num-${n}">${n}</div>`;
      cont.innerHTML = celdas;
    }

    let ESTILO_GRID_ACTUAL = null;
    let ULTIMO_TABLERO_RECIBIDO = null;

    function pintarTablero(tablero) {
      ULTIMO_TABLERO_RECIBIDO = tablero;
      const visible = !!tablero.visible_publico;
      document.getElementById("mensajeEspera").style.display = visible ? "none" : "block";
      document.getElementById("contenidoTablero").style.display = visible ? "block" : "none";
      if (!visible) return;

      const ajustesLocales = obtenerAjustesLocales();

      // Solo reconstruye el grid si cambió el estilo (evita parpadeos innecesarios)
      const estiloGrid = (ajustesLocales.grid && ajustesLocales.grid !== 'admin') ? ajustesLocales.grid : (tablero.estilo_grid || 'bingo');
      if (estiloGrid !== ESTILO_GRID_ACTUAL) {
        estiloGrid === 'simple' ? construirGrillaSimple() : construirGrilla();
        ESTILO_GRID_ACTUAL = estiloGrid;
      }

      const marcados = tablero.numeros_marcados || [];
      const colorMarcado = tablero.color_marcado || '#2ecc71';
      const colorParpadeo = tablero.color_parpadeo || '#e67e22';
      const ocultarNoLlamados = !!tablero.ocultar_no_llamados;

      document.querySelectorAll(".num-celda").forEach(el => {
        el.classList.remove("marcado", "ultimo");
        el.style.background = "";
        el.style.animationName = "";
        const num = el.id.replace("pub-num-", "");
        el.innerText = ocultarNoLlamados && !marcados.includes(Number(num)) ? "" : num;
      });

      marcados.forEach(n => {
        const el = document.getElementById("pub-num-" + n);
        if (el) { el.classList.add("marcado"); el.style.background = colorMarcado; el.style.color = "#0f172a"; }
      });

      if (marcados.length > 0) {
        const ultimoEl = document.getElementById("pub-num-" + marcados[marcados.length - 1]);
        if (ultimoEl) { ultimoEl.classList.add("ultimo"); ultimoEl.style.background = colorParpadeo; ultimoEl.style.color = "white"; }
      }

      document.getElementById("numeroActual").style.background = colorParpadeo;

      TAMANO_FUENTE_JUEGOS = tablero.tamano_fuente_juegos || 16;
      const contJuegos = document.getElementById("listaJuegosPublico");
      if (contJuegos) contJuegos.style.fontSize = TAMANO_FUENTE_JUEGOS + "px";

      document.getElementById("numeroActual").innerText = marcados.length > 0 ? marcados[marcados.length - 1] : "--";

      const ultimos = marcados.slice(-5).reverse();
      document.getElementById("ultimos5").innerHTML = ultimos.map(n => `<div class="chip-ultimo">${n}</div>`).join("");

      aplicarLayout(tablero.layout || 'horizontal', tablero.posicion_camara || 'derecha', tablero.plantilla || 'clasica', ajustesLocales);
      montarCamaras(tablero.camaras || []);
    }

    function aplicarLayout(layout, posicionCamara, plantilla, ajustesLocales) {
      const cont = document.getElementById("contenedorPrincipal");
      let clase;

      if (ajustesLocales && ajustesLocales.layout && ajustesLocales.layout !== 'admin') {
        clase = ajustesLocales.layout; // 'horizontal' | 'vertical-derecha' | 'vertical-izquierda'
      } else {
        clase = layout === 'vertical'
          ? (posicionCamara === 'izquierda' ? 'vertical-izquierda' : 'vertical-derecha')
          : 'horizontal';
      }

      cont.className = clase + (plantilla === 'show' ? ' plantilla-show' : '');
    }

    /* =========================================================================
       AJUSTES LOCALES DEL ESPECTADOR (solo en este navegador, nunca en la BD)
       Tienen prioridad sobre lo que configuró el organizador, si el espectador
       decide ajustarlo (ej. pantalla grande de PC que aprovecha mejor horizontal).
       ========================================================================= */
    function claveAjustesLocales() { return 'tubingo_vista_' + MI_TENANT_ID; }

    function obtenerAjustesLocales() {
      try { return JSON.parse(localStorage.getItem(claveAjustesLocales())) || {}; } catch (e) { return {}; }
    }

    function toggleAjustesVista() {
      const panel = document.getElementById("panelAjustesVista");
      const abierto = panel.style.display === "block";
      panel.style.display = abierto ? "none" : "block";
      if (!abierto) {
        const ajustes = obtenerAjustesLocales();
        document.getElementById("selVistaLayout").value = ajustes.layout || "admin";
        document.getElementById("selVistaGrid").value = ajustes.grid || "admin";
      }
    }

    function guardarAjustesVistaLocal() {
      const layout = document.getElementById("selVistaLayout").value;
      const grid = document.getElementById("selVistaGrid").value;
      localStorage.setItem(claveAjustesLocales(), JSON.stringify({ layout, grid }));
      document.getElementById("panelAjustesVista").style.display = "none";
      if (ULTIMO_TABLERO_RECIBIDO) pintarTablero(ULTIMO_TABLERO_RECIBIDO);
    }

    function restablecerAjustesVistaLocal() {
      localStorage.removeItem(claveAjustesLocales());
      document.getElementById("panelAjustesVista").style.display = "none";
      if (ULTIMO_TABLERO_RECIBIDO) pintarTablero(ULTIMO_TABLERO_RECIBIDO);
    }

    let camarasYaMontadas = "";
    // Convierte enlaces normales de YouTube/Facebook a su versión "embebible"
    // (los enlaces normales bloquean la incrustación por seguridad del sitio original)
    function convertirUrlEmbebible(url) {
      if (!url) return url;

      // YouTube: watch?v=ID / youtu.be/ID / live/ID / shorts/ID -> youtube.com/embed/ID
      let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/live\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]+)/);
      if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&mute=1`;
      if (url.includes("youtube.com/embed/")) return url;

      // Canal de YouTube en vivo (sin ID de video), ej: youtube.com/channel/UCxxxx/live
      let mCanal = url.match(/youtube\.com\/channel\/([a-zA-Z0-9_-]+)\/live/);
      if (mCanal) return `https://www.youtube.com/embed/live_stream?channel=${mCanal[1]}&autoplay=1&mute=1`;

      // Facebook: cualquier enlace de video/watch -> plugin de video embebible oficial
      if (url.includes("facebook.com") && !url.includes("plugins/video.php")) {
        return `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=true`;
      }

      // OBS.Ninja / VDO.Ninja / cualquier otro enlace: se usa tal cual, ya están diseñados para incrustarse
      return url;
    }

    function activarCamaraLocal(boton) {
      const box = boton.closest(".cam-box");
      box.innerHTML = "";
      const video = document.createElement("video");
      video.autoplay = true; video.muted = true; video.playsInline = true;
      box.appendChild(video);
      navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } })
        .then(stream => { video.srcObject = stream; })
        .catch(() => { box.innerHTML = '<span>Sin acceso a la cámara de este dispositivo.</span>'; });
    }

    function montarCamaras(camaras) {
      const firma = JSON.stringify(camaras);
      if (firma === camarasYaMontadas) return; // evita reiniciar la cámara local en cada actualización
      camarasYaMontadas = firma;

      const zona = document.getElementById("zonaCamaras");
      zona.innerHTML = "";

      camaras.filter(c => c.activa && c.tipo).forEach((cam, i) => {
        const box = document.createElement("div");
        box.className = "cam-box";
        box.id = "camBox" + i;
        zona.appendChild(box);

        if (cam.tipo === "dispositivo") {
          box.innerHTML = `
            <div style="text-align:center; padding:10px;">
              <button onclick="activarCamaraLocal(this)" style="background:#e67e22; color:white; border:none; padding:10px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem;">
                🎥 Activar cámara de este dispositivo
              </button>
              <p style="font-size:0.7rem; color:#999; margin-top:8px;">Solo toca esto si ESTE dispositivo es la pantalla que transmite en vivo. Los participantes no deben tocarlo.</p>
            </div>`;
        } else if (cam.tipo === "enlace" && cam.url) {
          const iframe = document.createElement("iframe");
          iframe.src = convertirUrlEmbebible(cam.url);
          iframe.allow = "camera; microphone; autoplay; fullscreen";
          box.appendChild(iframe);

          if (cam.url.includes("youtube.com") || cam.url.includes("youtu.be")) {
            const aviso = document.createElement("div");
            aviso.style.cssText = "position:absolute; bottom:2px; left:2px; right:2px; font-size:0.6rem; color:#f39c12; background:rgba(0,0,0,0.6); padding:2px 4px; border-radius:4px; text-align:center; pointer-events:none;";
            aviso.innerText = "Si no carga: el dueño del video desactivó \"permitir insertar\" en YouTube, o el enlace no es válido.";
            box.style.position = "relative";
            box.appendChild(aviso);
          }
        }
      });
    }
  </script>
</body>
</html>
