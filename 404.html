<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Redirigiendo...</title>
  <script>
    // GitHub Pages muestra este archivo cuando la URL no existe como carpeta real,
    // por ejemplo: /pro/triunfobingo
    // Detecta automáticamente el nombre de tu repositorio (no hay que escribirlo a mano),
    // y redirige a index.html pasándole el "slug" del cliente como parámetro.
    (function () {
      const partes = window.location.pathname.split('/').filter(Boolean);
      const nombreRepo = partes[0] || "";
      const slug = partes[1] || "";
      const base = "/" + nombreRepo + "/";

      if (slug && !slug.includes(".")) {
        window.location.replace(base + "index.html?tenant=" + encodeURIComponent(slug));
      } else {
        window.location.replace(base + "index.html");
      }
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif; text-align:center; margin-top:40px;">Redirigiendo...</p>
</body>
</html>
